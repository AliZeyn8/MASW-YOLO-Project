# data/dataset.yaml
#
# پیکربندی دیتاست VisDrone2019 برای استفاده در Google Colab
# دیتاست از قبل در فرمت YOLO (images/ + labels/ با پوشه‌های train/val/test) در Google Drive آماده شده است
#
# پیش‌نیاز: قبل از اجرای train.py، در Colab این خط باید اجرا شده باشد:
#   from google.colab import drive
#   drive.mount('/content/drive')

# مسیر ریشه دیتاست (دقیقاً مطابق ساختار واقعی شما در Google Drive)
path: /content/drive/MyDrive/VisDrone_Project/dataset/VisDrone

# مسیرهای تصاویر (نسبت به path) - Ultralytics به‌صورت خودکار "images" را در مسیر
# به "labels" تبدیل می‌کند تا فایل‌های annotation متناظر را پیدا کند
train: images/train   # 6471 تصویر
val: images/val       # 548 تصویر
test: images/test     # 1610 تصویر

# کلاس‌ها (VisDrone2019 - 10 کلاس)
names:
  0: pedestrian
  1: people
  2: bicycle
  3: car
  4: van
  5: truck
  6: tricycle
  7: awning-tricycle
  8: bus
  9: motor