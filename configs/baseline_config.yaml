# Baseline Configuration - YOLOv8n on VisDrone2019
# این کانفیگ برای آموزش مدل پایه YOLOv8n (بدون بهبودها) استفاده می‌شود
# مقادیر دقیقاً مطابق جدول 1 مقاله MASW-YOLO تنظیم شده‌اند

# Training
epochs: 100              # مطابق مقاله (جدول 1)
batch: 16                # مطابق مقاله (جدول 1)
imgsz: 640               # مطابق مقاله (جدول 1)
workers: 8               # تعداد کارگران برای بارگذاری داده
device: 0                # GPU device ID(s)

# Optimizer
optimizer: SGD           # بهینه‌ساز
lr0: 0.01                # نرخ یادگیری اولیه (مطابق مقاله جدول 1)
lrf: 0.01                # ضریب نرخ یادگیری نهایی (مطابق مقاله جدول 1)
momentum: 0.937          # مومنتوم (مطابق مقاله جدول 1)
weight_decay: 0.0005     # مقدار پیش‌فرض YOLOv8

# Learning rate scheduler
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# Loss
box: 7.5                 # box loss gain
cls: 0.5                 # cls loss gain
dfl: 1.5                 # dfl loss gain

# Data augmentation (پیش‌فرض YOLOv8)
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0

# Model
model: yolov8n.pt        # مدل پایه با وزن‌های پیش‌آموزش‌دیده COCO

# Project settings
project: runs/train
name: yolov8n_visdrone_baseline
exist_ok: true
verbose: true

# Data
data: data/visdrone_gdrive.yaml  # فایل تنظیمات دیتاست (Google Drive)